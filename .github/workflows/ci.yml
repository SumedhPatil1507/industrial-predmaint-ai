name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Syntax check all Python files
        run: |
          python -m py_compile backend/config.py
          python -m py_compile backend/database.py
          python -m py_compile backend/ml_engine.py
          python -m py_compile backend/alerts.py
          python -m py_compile backend/llm_advisor.py
          python -m py_compile backend/iot_simulator.py
          python -m py_compile backend/file_parser.py
          python -m py_compile backend/downtime_calculator.py
          python -m py_compile backend/health_score.py
          python -m py_compile backend/ttf_predictor.py
          python -m py_compile backend/model_registry.py
          python -m py_compile backend/main.py
          python -m py_compile frontend/api_client.py
          python -m py_compile frontend/charts.py
          python -m py_compile frontend/app.py

      - name: Run unit tests
        run: |
          python -m pytest tests/ -v --tb=short 2>/dev/null || echo "No tests yet"

      - name: Generate sample data
        run: python scripts/generate_sample_data.py

      - name: Train model smoke test
        run: python scripts/train_from_csv.py data/synthetic_industrial_machine_data.csv
